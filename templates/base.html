<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Wealth Advisor{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; }
    .navbar { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%) !important; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .navbar-brand { font-weight: 800; font-size: 1.3rem; color: white !important; }
    .nav-link, .navbar-text { color: rgba(255,255,255,0.85) !important; }
    .nav-link:hover { color: white !important; }
    .card { border: none; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-header { border-radius: 14px 14px 0 0 !important; font-weight: 600; }
    .btn-primary { background: #2563eb; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .status-pending  { color: #6b7280; }
    .status-running  { color: #2563eb; }
    .status-completed{ color: #16a34a; }
    .status-failed   { color: #ef4444; }
    footer { margin-top: 60px; padding: 20px 0; color: #9ca3af; font-size: 0.85em; text-align: center; }
  </style>
</head>
<body>

{% if session.username %}
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/dashboard"><i class="bi bi-graph-up-arrow me-2"></i>Wealth Advisor</a>
    <div class="d-flex align-items-center gap-3">
      <span class="navbar-text"><i class="bi bi-person-circle me-1"></i>{{ session.username }}</span>
      <a class="btn btn-sm btn-outline-light" href="/logout">Logout</a>
    </div>
  </div>
</nav>
{% endif %}

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<footer>Wealth Advisor &mdash; AI-powered portfolio analysis &mdash; For educational purposes only</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
