{% extends "base.html" %}
{% block title %}Register — Wealth Advisor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">

    <div class="text-center mb-4">
      <i class="bi bi-graph-up-arrow text-primary" style="font-size:3rem"></i>
      <h2 class="fw-bold mt-2">Create Account</h2>
      <p class="text-muted">Start analyzing your portfolio</p>
    </div>

    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    <div class="card p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account <i class="bi bi-arrow-right ms-1"></i></button>
      </form>
    </div>

    <p class="text-center mt-3 text-muted">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
